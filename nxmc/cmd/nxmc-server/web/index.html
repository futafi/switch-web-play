<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nxmc</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 16px; }
#status { padding: 8px; margin-bottom: 16px; border-radius: 4px; }
#status.connected { background: #1b4332; }
#status.disconnected { background: #6b1e1e; }

.section { margin-bottom: 16px; }
.section h3 { font-size: 12px; color: #888; margin-bottom: 4px; }

#state { font-size: 14px; line-height: 1.8; }
#state .active { color: #4ade80; font-weight: bold; }

.controller-visual {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 500px;
}

.stick-display {
  width: 100px; height: 100px;
  background: #333; border-radius: 50%;
  position: relative; border: 1px solid #555;
}
.stick-dot {
  width: 12px; height: 12px;
  background: #4ade80; border-radius: 50%;
  position: absolute;
  transform: translate(-50%, -50%);
  transition: left 0.03s, top 0.03s;
}

.buttons-display { display: flex; flex-wrap: wrap; gap: 4px; }
.btn {
  padding: 4px 8px; font-size: 11px;
  background: #333; border-radius: 3px; border: 1px solid #555;
}
.btn.active { background: #166534; border-color: #4ade80; color: #4ade80; }

.hat-grid {
  display: grid;
  grid-template-columns: repeat(3, 28px);
  grid-template-rows: repeat(3, 28px);
  gap: 2px;
}
.hat-cell {
  background: #333; border-radius: 3px; border: 1px solid #555;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.hat-cell.active { background: #166534; border-color: #4ade80; }
.hat-cell.center { border-radius: 50%; }

#keymap {
  font-size: 11px; color: #888; line-height: 1.6;
  column-count: 2; max-width: 500px;
}
#keymap kbd {
  background: #333; padding: 1px 5px; border-radius: 2px;
  border: 1px solid #555; font-size: 10px;
}
</style>
</head>
<body>

<div id="status" class="disconnected">disconnected</div>

<div class="section">
  <h3>Gamepad</h3>
  <div id="gamepad-info">none</div>
</div>

<div class="section">
  <h3>Buttons</h3>
  <div class="buttons-display" id="buttons-display"></div>
</div>

<div class="section controller-visual">
  <div>
    <h3>L Stick</h3>
    <div class="stick-display"><div class="stick-dot" id="lstick-dot"></div></div>
  </div>
  <div>
    <h3>R Stick</h3>
    <div class="stick-display"><div class="stick-dot" id="rstick-dot"></div></div>
  </div>
  <div>
    <h3>Hat</h3>
    <div class="hat-grid" id="hat-grid"></div>
  </div>
</div>

<div class="section">
  <h3>Keyboard</h3>
  <div id="keymap"></div>
</div>

<script>
const BUTTONS = [
  { name: 'Y',  bit: 0x0001 },
  { name: 'B',  bit: 0x0002 },
  { name: 'A',  bit: 0x0004 },
  { name: 'X',  bit: 0x0008 },
  { name: 'L',  bit: 0x0010 },
  { name: 'R',  bit: 0x0020 },
  { name: 'ZL', bit: 0x0040 },
  { name: 'ZR', bit: 0x0080 },
  { name: '-',  bit: 0x0100 },
  { name: '+',  bit: 0x0200 },
  { name: 'LC', bit: 0x0400 },
  { name: 'RC', bit: 0x0800 },
  { name: 'HOME', bit: 0x1000 },
  { name: 'CAP',  bit: 0x2000 },
];

const HAT_NAMES = ['U','UR','R','DR','D','DL','L','UL','*'];
const HAT_GRID_MAP = [
  { hat: 7, label: 'UL' }, { hat: 0, label: 'U' },  { hat: 1, label: 'UR' },
  { hat: 6, label: 'L' },  { hat: 8, label: '*' },   { hat: 2, label: 'R' },
  { hat: 5, label: 'DL' }, { hat: 4, label: 'D' },   { hat: 3, label: 'DR' },
];

const KEY_MAP = {
  'KeyW':       { type: 'lstick', dir: 'up' },
  'KeyA':       { type: 'lstick', dir: 'left' },
  'KeyS':       { type: 'lstick', dir: 'down' },
  'KeyD':       { type: 'lstick', dir: 'right' },
  'ArrowUp':    { type: 'hat', hat: 0 },
  'ArrowRight': { type: 'hat', hat: 2 },
  'ArrowDown':  { type: 'hat', hat: 4 },
  'ArrowLeft':  { type: 'hat', hat: 6 },
  'KeyK':       { type: 'button', bit: 0x0004 },  // A
  'KeyJ':       { type: 'button', bit: 0x0002 },  // B
  'KeyI':       { type: 'button', bit: 0x0008 },  // X
  'KeyU':       { type: 'button', bit: 0x0001 },  // Y
  'KeyQ':       { type: 'button', bit: 0x0010 },  // L
  'KeyE':       { type: 'button', bit: 0x0020 },  // R
  'KeyZ':       { type: 'button', bit: 0x0040 },  // ZL
  'KeyC':       { type: 'button', bit: 0x0080 },  // ZR
  'Minus':      { type: 'button', bit: 0x0100 },  // -
  'Equal':      { type: 'button', bit: 0x0200 },  // +
  'KeyF':       { type: 'button', bit: 0x0400 },  // L Click
  'Semicolon':  { type: 'button', bit: 0x0800 },  // R Click
  'KeyH':       { type: 'button', bit: 0x1000 },  // Home
  'KeyG':       { type: 'button', bit: 0x2000 },  // Capture
  'KeyO':       { type: 'rstick', dir: 'up' },
  'KeyL':       { type: 'rstick', dir: 'right' },
  'Period':     { type: 'rstick', dir: 'down' },
  'Comma':      { type: 'rstick', dir: 'left' }, // Semicolon is taken, use comma
};

const KEY_LABELS = {
  'KeyW': 'W', 'KeyA': 'A', 'KeyS': 'S', 'KeyD': 'D',
  'ArrowUp': 'Up', 'ArrowRight': 'Right', 'ArrowDown': 'Down', 'ArrowLeft': 'Left',
  'KeyK': 'K', 'KeyJ': 'J', 'KeyI': 'I', 'KeyU': 'U',
  'KeyQ': 'Q', 'KeyE': 'E', 'KeyZ': 'Z', 'KeyC': 'C',
  'Minus': '-', 'Equal': '=', 'KeyF': 'F', 'Semicolon': ';',
  'KeyH': 'H', 'KeyG': 'G',
  'KeyO': 'O', 'KeyL': 'L', 'Period': '.', 'Comma': ',',
};

const BUTTON_NAMES = {};
BUTTONS.forEach(b => BUTTON_NAMES[b.bit] = b.name);

// State
let keyState = {};
let lastSent = '';
let ws = null;

// Build UI
function initUI() {
  const bd = document.getElementById('buttons-display');
  BUTTONS.forEach(b => {
    const el = document.createElement('div');
    el.className = 'btn';
    el.id = 'btn-' + b.name;
    el.textContent = b.name;
    bd.appendChild(el);
  });

  const hg = document.getElementById('hat-grid');
  HAT_GRID_MAP.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hat-cell' + (h.hat === 8 ? ' center' : '');
    el.id = 'hat-' + h.hat;
    el.textContent = h.label;
    hg.appendChild(el);
  });

  const km = document.getElementById('keymap');
  const groups = { 'L Stick': [], 'R Stick': [], 'Hat': [], 'Buttons': [] };
  for (const [code, mapping] of Object.entries(KEY_MAP)) {
    const label = KEY_LABELS[code] || code;
    let target = '';
    if (mapping.type === 'button') target = BUTTON_NAMES[mapping.bit];
    else if (mapping.type === 'hat') target = 'Hat ' + HAT_NAMES[mapping.hat];
    else if (mapping.type === 'lstick') target = 'LS ' + mapping.dir;
    else if (mapping.type === 'rstick') target = 'RS ' + mapping.dir;

    const group = mapping.type === 'lstick' ? 'L Stick' :
                  mapping.type === 'rstick' ? 'R Stick' :
                  mapping.type === 'hat' ? 'Hat' : 'Buttons';
    groups[group].push(`<kbd>${label}</kbd> ${target}`);
  }
  km.innerHTML = Object.entries(groups).map(([g, items]) =>
    `<div><strong>${g}:</strong> ${items.join(', ')}</div>`
  ).join('');
}

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    document.getElementById('status').className = 'connected';
    document.getElementById('status').textContent = 'connected';
  };
  ws.onclose = () => {
    document.getElementById('status').className = 'disconnected';
    document.getElementById('status').textContent = 'disconnected — reconnecting...';
    setTimeout(connect, 1000);
  };
}

// Keyboard
document.addEventListener('keydown', e => {
  if (KEY_MAP[e.code]) { e.preventDefault(); keyState[e.code] = true; }
});
document.addEventListener('keyup', e => {
  if (KEY_MAP[e.code]) { e.preventDefault(); keyState[e.code] = false; }
});

// Gamepad mapping (Standard Gamepad → Switch buttons)
const GP_BUTTON_MAP = [
  0x0002, // [0] bottom → B
  0x0004, // [1] right → A
  0x0001, // [2] left → Y
  0x0008, // [3] top → X
  0x0010, // [4] L
  0x0020, // [5] R
  0x0040, // [6] ZL
  0x0080, // [7] ZR
  0x0100, // [8] -
  0x0200, // [9] +
  0x0400, // [10] L Click
  0x0800, // [11] R Click
  0,      // [12] D-pad Up (hat)
  0,      // [13] D-pad Down (hat)
  0,      // [14] D-pad Left (hat)
  0,      // [15] D-pad Right (hat)
  0x1000, // [16] Home/Guide
  0x2000, // [17] Capture (Pro Controller MISC1)
];

function hatFromDpad(up, right, down, left) {
  if (up && right) return 1;
  if (right && down) return 3;
  if (down && left) return 5;
  if (left && up) return 7;
  if (up) return 0;
  if (right) return 2;
  if (down) return 4;
  if (left) return 6;
  return 8;
}

function axisToStick(val) {
  return Math.max(0, Math.min(255, Math.round((val + 1) * 127.5)));
}

function buildReport() {
  let buttons = 0;
  let hat = 8;
  let lx = 128, ly = 128, rx = 128, ry = 128;

  // Keyboard
  let kbLU = false, kbLD = false, kbLL = false, kbLR = false;
  let kbRU = false, kbRD = false, kbRL = false, kbRR = false;
  let kbHatU = false, kbHatD = false, kbHatL = false, kbHatR = false;

  for (const [code, pressed] of Object.entries(keyState)) {
    if (!pressed) continue;
    const m = KEY_MAP[code];
    if (!m) continue;
    if (m.type === 'button') buttons |= m.bit;
    else if (m.type === 'hat') {
      if (m.hat === 0) kbHatU = true;
      if (m.hat === 2) kbHatR = true;
      if (m.hat === 4) kbHatD = true;
      if (m.hat === 6) kbHatL = true;
    }
    else if (m.type === 'lstick') {
      if (m.dir === 'up') kbLU = true;
      if (m.dir === 'down') kbLD = true;
      if (m.dir === 'left') kbLL = true;
      if (m.dir === 'right') kbLR = true;
    }
    else if (m.type === 'rstick') {
      if (m.dir === 'up') kbRU = true;
      if (m.dir === 'down') kbRD = true;
      if (m.dir === 'left') kbRL = true;
      if (m.dir === 'right') kbRR = true;
    }
  }

  hat = hatFromDpad(kbHatU, kbHatR, kbHatD, kbHatL);
  if (kbLL) lx = 0;   else if (kbLR) lx = 255;
  if (kbLU) ly = 0;   else if (kbLD) ly = 255;
  if (kbRL) rx = 0;   else if (kbRR) rx = 255;
  if (kbRU) ry = 0;   else if (kbRD) ry = 255;

  // Gamepad (overrides keyboard for analog, OR for buttons)
  const gamepads = navigator.getGamepads();
  for (const gp of gamepads) {
    if (!gp) continue;

    document.getElementById('gamepad-info').textContent =
      gp.id + (gp.mapping === 'standard' ? ' [standard]' : ' [non-standard]');

    // Buttons
    for (let i = 0; i < gp.buttons.length && i < GP_BUTTON_MAP.length; i++) {
      if (gp.buttons[i].pressed && GP_BUTTON_MAP[i]) {
        buttons |= GP_BUTTON_MAP[i];
      }
    }

    // D-pad (buttons 12-15: Up, Down, Left, Right)
    if (gp.buttons.length > 15) {
      const gpHat = hatFromDpad(
        gp.buttons[12].pressed, gp.buttons[15].pressed,
        gp.buttons[13].pressed, gp.buttons[14].pressed
      );
      if (gpHat !== 8) hat = gpHat;
    }

    // Analog sticks (override keyboard digital input if moved)
    const deadzone = 0.15;
    if (gp.axes.length >= 2) {
      if (Math.abs(gp.axes[0]) > deadzone || Math.abs(gp.axes[1]) > deadzone) {
        lx = axisToStick(gp.axes[0]);
        ly = axisToStick(gp.axes[1]);
      }
    }
    if (gp.axes.length >= 4) {
      if (Math.abs(gp.axes[2]) > deadzone || Math.abs(gp.axes[3]) > deadzone) {
        rx = axisToStick(gp.axes[2]);
        ry = axisToStick(gp.axes[3]);
      }
    }

    break; // use first gamepad only
  }

  return { buttons, hat, lx, ly, rx, ry };
}

function updateUI(report) {
  // Buttons
  BUTTONS.forEach(b => {
    const el = document.getElementById('btn-' + b.name);
    el.className = 'btn' + ((report.buttons & b.bit) ? ' active' : '');
  });

  // Hat
  HAT_GRID_MAP.forEach(h => {
    const el = document.getElementById('hat-' + h.hat);
    el.className = 'hat-cell' + (h.hat === 8 ? ' center' : '') +
                   (report.hat === h.hat ? ' active' : '');
  });

  // Sticks
  const lDot = document.getElementById('lstick-dot');
  lDot.style.left = (report.lx / 255 * 100) + '%';
  lDot.style.top = (report.ly / 255 * 100) + '%';

  const rDot = document.getElementById('rstick-dot');
  rDot.style.left = (report.rx / 255 * 100) + '%';
  rDot.style.top = (report.ry / 255 * 100) + '%';
}

// Main loop
function loop() {
  const report = buildReport();
  updateUI(report);

  const json = JSON.stringify(report);
  if (json !== lastSent && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(json);
    lastSent = json;
  }

  requestAnimationFrame(loop);
}

initUI();
connect();
requestAnimationFrame(loop);
</script>
</body>
</html>
