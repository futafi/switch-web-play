<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>nxmc</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<div id="overlay" class="overlay hidden">
  <div class="overlay-left">
    <div class="shoulder-buttons left">
      <button class="touch-btn shoulder" data-btn="0x0040">ZL</button>
      <button class="touch-btn shoulder" data-btn="0x0010">L</button>
    </div>
    <div class="stick-zone" id="lstick-zone">
      <div class="stick-visual" id="lstick-visual">
        <div class="stick-knob" id="lstick-knob"></div>
      </div>
    </div>
    <div class="dpad">
      <button class="touch-btn dpad-btn dpad-u" data-hat="0">&#9650;</button>
      <button class="touch-btn dpad-btn dpad-l" data-hat="6">&#9664;</button>
      <button class="touch-btn dpad-btn dpad-r" data-hat="2">&#9654;</button>
      <button class="touch-btn dpad-btn dpad-d" data-hat="4">&#9660;</button>
    </div>
  </div>

  <div class="overlay-center">
    <div class="center-row">
      <button class="touch-btn small" data-btn="0x0100">&minus;</button>
      <button class="touch-btn small" data-btn="0x1000">H</button>
      <button class="touch-btn small" data-btn="0x0200">+</button>
      <button class="touch-btn small" data-btn="0x2000">CAP</button>
    </div>
  </div>

  <div class="overlay-right">
    <div class="shoulder-buttons right">
      <button class="touch-btn shoulder" data-btn="0x0080">ZR</button>
      <button class="touch-btn shoulder" data-btn="0x0020">R</button>
    </div>
    <div class="face-buttons">
      <button class="touch-btn face face-x" data-btn="0x0008">X</button>
      <button class="touch-btn face face-y" data-btn="0x0001">Y</button>
      <button class="touch-btn face face-a" data-btn="0x0004">A</button>
      <button class="touch-btn face face-b" data-btn="0x0002">B</button>
    </div>
    <div class="stick-zone" id="rstick-zone">
      <div class="stick-visual" id="rstick-visual">
        <div class="stick-knob" id="rstick-knob"></div>
      </div>
    </div>
  </div>
</div>

<button id="settings-toggle" class="gear-btn" aria-label="Settings">&#9881;</button>

<div id="settings-panel" class="settings-panel hidden">
  <div class="settings-header">
    <span>Settings</span>
    <button id="settings-close" class="close-btn">&times;</button>
  </div>
  <div class="settings-body">
    <label class="setting-row">
      <span>Volume</span>
      <button id="opt-mute" class="mute-btn" aria-label="Unmute">&#128263;</button>
      <input type="range" id="opt-volume" min="0" max="100" value="50">
      <span id="opt-volume-val">50%</span>
    </label>
    <label class="setting-row">
      <span>Overlay</span>
      <input type="checkbox" id="opt-overlay">
    </label>
    <label class="setting-row">
      <span>Opacity</span>
      <input type="range" id="opt-opacity" min="10" max="100" value="50">
      <span id="opt-opacity-val">50%</span>
    </label>
    <div class="setting-group">
      <span>Resolution</span>
      <label><input type="radio" name="resolution" value="1080" checked> 1080p</label>
      <label><input type="radio" name="resolution" value="720"> 720p</label>
      <label><input type="radio" name="resolution" value="480"> 480p</label>
      <label><input type="radio" name="resolution" value="360"> 360p</label>
    </div>
    <div class="setting-group">
      <span>Bitrate</span>
      <label><input type="radio" name="bitrate" value="12000" checked> 12 Mbps</label>
      <label><input type="radio" name="bitrate" value="8000"> 8 Mbps</label>
      <label><input type="radio" name="bitrate" value="4000"> 4 Mbps</label>
      <label><input type="radio" name="bitrate" value="2000"> 2 Mbps</label>
    </div>
    <div class="setting-row">
      <span>Keyboard</span>
      <button id="keyhelp-btn" class="help-btn">?</button>
    </div>
    <div class="setting-group">
      <div class="setting-row" style="border:none;padding:0;margin-bottom:4px">
        <span>Gamepad</span>
        <button id="gpmap-btn" class="help-btn">&#9881;</button>
      </div>
      <div id="gamepad-info" style="font-size:12px;color:#888">No gamepad</div>
    </div>
  </div>
</div>

<div id="keyhelp-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <span>Keyboard Controls</span>
      <button id="keyhelp-close" class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="keymap-section">
        <h4>L Stick</h4><p>W / A / S / D</p>
        <h4>R Stick</h4><p>O / , / . / L</p>
        <h4>Hat</h4><p>Arrow keys</p>
      </div>
      <div class="keymap-section">
        <h4>Buttons</h4>
        <p>A: <kbd>K</kbd> B: <kbd>J</kbd> X: <kbd>I</kbd> Y: <kbd>U</kbd></p>
        <p>L: <kbd>Q</kbd> R: <kbd>E</kbd> ZL: <kbd>Z</kbd> ZR: <kbd>C</kbd></p>
        <p>LC: <kbd>F</kbd> RC: <kbd>;</kbd></p>
        <p>+: <kbd>=</kbd> -: <kbd>-</kbd> Home: <kbd>H</kbd> Cap: <kbd>G</kbd></p>
      </div>
    </div>
  </div>
</div>

<div id="gpmap-modal" class="modal hidden">
  <div class="modal-content modal-wide">
    <div class="modal-header">
      <span>Gamepad Mapping</span>
      <button id="gpmap-close" class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div id="gpmap-list"></div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button id="gpmap-reset" class="modal-action-btn">Reset to Default</button>
      </div>
      <div id="gpmap-listen" class="gpmap-listen hidden">
        Press a gamepad button for <strong id="gpmap-listen-target"></strong>...
        <button id="gpmap-listen-cancel" class="modal-action-btn">Cancel</button>
        <button id="gpmap-listen-clear" class="modal-action-btn">Clear</button>
      </div>
    </div>
  </div>
</div>

<div id="status-indicator" class="status-dot disconnected" title="disconnected"></div>

<script src="whep.js"></script>
<script src="input.js"></script>
<script src="touch.js"></script>
<script src="settings.js"></script>
<script src="main.js"></script>
</body>
</html>
