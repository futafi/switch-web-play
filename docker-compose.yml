services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8889:8889"
      - "8189:8189/udp"
    volumes:
      - ./streaming/mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  gstreamer:
    image: restreamio/gstreamer:latest-dev
    devices:
      - ${VIDEO_DEVICE}:/dev/video0
      - /dev/snd:/dev/snd
    command: >
      gst-launch-1.0 -v
      v4l2src device=/dev/video0 ! image/jpeg,width=${WIDTH:-1920},height=${HEIGHT:-1080},framerate=30/1
      ! jpegdec ! videoconvert
      ! x264enc tune=zerolatency speed-preset=ultrafast bitrate=${BITRATE:-12000} key-int-max=30
      ! h264parse
      ! rtspclientsink location=rtsp://mediamtx:8554/cam name=sink
      alsasrc device=${AUDIO_DEVICE}
      ! audioconvert ! audioresample
      ! opusenc bitrate=128000 frame-size=10
      ! sink.
    restart: unless-stopped
    depends_on:
      - mediamtx

  nxmc:
    build: ./nxmc
    ports:
      - "9000:9000"
    devices:
      - ${SERIAL_DEVICE}:/dev/ttyUSB0
    restart: unless-stopped
    depends_on:
      - mediamtx
