services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  gstreamer:
    image: restreamio/gstreamer:latest-dev
    network_mode: host
    devices:
      - /dev/video0:/dev/video0
      - /dev/snd:/dev/snd
    command: >
      gst-launch-1.0 -v
      v4l2src device=/dev/video0 ! image/jpeg,width=1920,height=1080,framerate=30/1
      ! jpegdec ! videoconvert
      ! x264enc tune=zerolatency speed-preset=ultrafast bitrate=12000 key-int-max=30
      ! h264parse
      ! rtspclientsink location=rtsp://127.0.0.1:8554/cam name=sink
      alsasrc device=hw:MS2109,0
      ! audioconvert ! audioresample
      ! opusenc bitrate=128000 frame-size=10
      ! sink.
    restart: unless-stopped
    depends_on:
      - mediamtx
